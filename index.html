<!DOCTYPE html>
<html lang="ja">
<head>
  <meta http-equiv="Content-Security-Policy" 
        content="default-src 'self'; 
                 script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://www.gstatic.com https://apis.google.com blob:; 
                 worker-src 'self' blob:;
                 connect-src 'self' https://firestore.googleapis.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://firebaseauth.googleapis.com https://www.googleapis.com https://www.gstatic.com https://cdn.jsdelivr.net; 
                 frame-src https://*.firebaseapp.com https://accounts.google.com https://www.google.com; 
                 img-src 'self' https://lh3.googleusercontent.com; 
                 style-src 'self' 'unsafe-inline';">
                    
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todoリスト</title>
  <link rel="stylesheet" href="./main.css">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>
<div id="app">
  <button class="hamburger" @click="isMenuOpen = !isMenuOpen">
    <span></span><span></span><span></span>
  </button>

  <div class="menu-overlay" v-if="isMenuOpen" @click="isMenuOpen = false"></div>
  <div class="side-menu" :class="{ 'is-open': isMenuOpen }">
    <h2>設定</h2>
    <div class="menu-item">
      <span>期限通知</span>
      <label class="switch">
        <input type="checkbox" v-model="notificationEnabled" @change="toggleNotification">
        <span class="slider"></span>
      </label>
    </div>
    <div class="menu-item">
      <span>完了エフェクト</span>
      <label class="switch">
        <input type="checkbox" v-model="effectEnabled" @change="toggleEffect">
        <span class="slider"></span>
      </label>
    </div>
    <div class="menu-item" style="margin-top: 30px;">
      <button @click="showTerms = true" style="cursor:pointer;">利用規約を表示</button>
    </div>
  </div>

  <div class="modal-overlay" v-if="showTerms" @click="showTerms = false">
    <div class="modal-content" @click.stop>
      <h2>利用規約</h2>
      <div class="terms-text" style="text-align: left; font-size: 0.9em; height: 300px; overflow-y: auto; padding: 15px; border: 1px solid #ccc; background: #f9f9f9;">
        <p><strong>第1条（目的）</strong><br>本利用規約は、本アプリの利用条件を定めるものです。</p>
        <p>（以下、省略...）</p>
      </div>
      <button @click="showTerms = false" style="margin-top: 15px; padding: 8px 20px;">閉じる</button>
    </div>
  </div>

  <h1>ToDoリスト</h1>

  <div v-if="user" class="user-area">
    <div class="user-card">
      <img :src="user.photoURL" alt="icon" class="user-icon">
      <span class="user-name">{{ user.displayName }}</span>
      <button @click="logout" class="logout-button">ログアウト</button>
    </div>
  </div>
  <div v-else class="user-area">
    <button @click="login">Googleでログイン</button>
  </div>
    
  <form class="add-form" @submit.prevent="doAdd">
    <input type="text" v-model="newTodo" placeholder="タスクを入力">
    <input type="date" v-model="newDate">
    <button type="submit">追加</button>
  </form>

  <h2>進行中のタスク</h2>
  <table>
    <thead>
      <tr><th>★</th><th>コメント</th><th>期限</th><th>操作</th><th>-</th></tr>
    </thead>
<tbody>
  <tr v-for="item in activeTodos" :key="item.id" 
      :class="{ 'danger-item': isUrgent(item.dueDate), 'starred-item': item.isStarred }">
    
    <td @click="doToggleStar(item)" style="cursor:pointer; font-size: 1.2em;" :class="{'star-on': item.isStarred}">
      {{ item.isStarred ? '★' : '☆' }}
    </td>

    <td>
      <input v-if="editingId === item.id" v-model="editComment" class="edit-input">
      <span v-else>{{ item.comment }}</span>
    </td>

    <td>
      <input v-if="editingId === item.id" type="date" v-model="editDate" class="edit-input-date">
      <span v-else>{{ item.dueDate }}</span>
    </td>

    <td>
      <div v-if="editingId === item.id">
        <button @click="doUpdate(item)" class="save-btn">保存</button>
      </div>
      <button v-else @click="doChangeState(item)" class="done-btn"> 完了 </button>
    </td>

    <td>
      <div class="action-group">
        <template v-if="editingId === item.id">
          <button @click="cancelEdit" class="cancel-btn">✕</button>
        </template>
        <template v-else>
          <button @click="startEdit(item)" class="edit-btn" title="編集">✏️</button>
          <button @click="doRemove(item)" class="delete-btn" title="削除">🗑️</button>
        </template>
      </div>
    </td>
  </tr>
</tbody>
    
  </table>

  <h2 style="margin-top: 40px;">完了済みタスク</h2>
  <table class="archive-table">
    <thead>
      <tr><th>★</th><th>コメント</th><th>期限</th><th>操作</th><th>-</th></tr>
    </thead>
    <tbody>
      <tr v-for="item in archivedTodos" :key="item.id">
        <td @click="doToggleStar(item)" style="cursor:pointer;">{{ item.isStarred ? '★' : '☆' }}</td>
        <td>{{ item.comment }}</td>
        <td>{{ item.dueDate }}</td>
        <td><button @click="doChangeState(item)">戻す</button></td>
        <td><button @click="doRemove(item)">削除</button></td>
      </tr>
    </tbody>
  </table>
</div>

  <script src="https://cdn.jsdelivr.net/npm/vue@2"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

    firebase.initializeApp(firebaseConfig);
  </script>
  <script src="./main.js"></script>
</body>
</html>
