<!DOCTYPE html>
<html lang="ja">
<head>
  <meta http-equiv="Content-Security-Policy" 
        content="default-src 'self'; 
                 script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://www.gstatic.com https://apis.google.com blob:; 
                 worker-src 'self' blob:;
                 connect-src 'self' https://firestore.googleapis.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://firebaseauth.googleapis.com https://www.googleapis.com https://www.gstatic.com https://cdn.jsdelivr.net; 
                 frame-src https://*.firebaseapp.com https://accounts.google.com https://www.google.com; 
                 img-src 'self' https://lh3.googleusercontent.com; 
                 style-src 'self' 'unsafe-inline';">
                    
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todoリスト</title>
  <link rel="stylesheet" href="./main.css">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>
<div id="app">
  <button class="hamburger" @click="isMenuOpen = !isMenuOpen">
    <span></span><span></span><span></span>
  </button>

  <div class="menu-overlay" v-if="isMenuOpen" @click="isMenuOpen = false"></div>
  <div class="side-menu" :class="{ 'is-open': isMenuOpen }">
    <h2>設定</h2>
    
    <div class="menu-item">
      <span>編集モード</span>
      <label class="switch">
        <input type="checkbox" v-model="isEditMode" @change="toggleEditMode">
        <span class="slider"></span>
      </label>
    </div>

    <div class="menu-item">
      <span>期限通知</span>
      <label class="switch">
        <input type="checkbox" v-model="notificationEnabled" @change="toggleNotification">
        <span class="slider"></span>
      </label>
    </div>
    <div class="menu-item">
      <span>完了エフェクト</span>
      <label class="switch">
        <input type="checkbox" v-model="effectEnabled" @change="toggleEffect">
        <span class="slider"></span>
      </label>
    </div>
    
    <div class="menu-item" style="margin-top: 30px;">
      <button @click="showTerms = true" style="cursor:pointer;">利用規約を表示</button>
    </div>
  </div>

  <div class="modal-overlay" v-if="showTerms" @click="showTerms = false">
    <div class="modal-content" @click.stop>
      <h2>利用規約</h2>
      <div class="terms-text" style="text-align: left; font-size: 0.9em; height: 300px; overflow-y: auto; padding: 15px; border: 1px solid #ccc; background: #f9f9f9;">
        <p><strong>第1条（目的）</strong><br>本ToDoアプリの利用条件を定めるものです。</p>
        <p>（第2条以降省略）</p>
      </div>
      <button @click="showTerms = false" style="margin-top: 15px; padding: 8px 20px;">閉じる</button>
    </div>
  </div>

  <h1>ToDoリスト</h1>

  <div v-if="user" class="user-area">
    <div class="user-card">
      <img :src="user.photoURL" alt="icon" class="user-icon">
      <span class="user-name">{{ user.displayName }}</span>
      <button @click="logout" class="logout-button">ログアウト</button>
    </div>
  </div>
  <div v-else class="user-area">
    <button @click="login">Googleでログイン</button>
  </div>
    
  <form class="add-form" @submit.prevent="doAdd">
    <input type="text" v-model="newTodo" placeholder="新しいタスクを入力">
    <input type="date" v-model="newDate">
    <button type="submit">追加</button>
  </form>

  <h2>進行中のタスク <small v-if="isEditMode" style="color: #f39c12; font-size: 0.6em;">（編集モード中）</small></h2>
  <table>
    <thead>
      <tr>
        <th style="width: 40px;">★</th>
        <th>内容 / 期限</th>
        <th style="width: 80px; text-align: center;">操作</th>
      </tr>
    </thead>
    <tbody>
      <tr v-for="item in activeTodos" :key="item.id" 
          :class="{ 'danger-item': isUrgent(item.dueDate), 'starred-item': item.isStarred }">
        
        <td @click="doToggleStar(item)" style="cursor:pointer; font-size: 1.2em; text-align: center;" :class="{'star-on': item.isStarred}">
          {{ item.isStarred ? '★' : '☆' }}
        </td>

        <td>
          <div v-if="editingId === item.id">
            <input v-model="editComment" class="edit-input" placeholder="コメント">
            <input type="date" v-model="editDate" class="edit-input-date">
          </div>
          <div v-else>
            <div class="todo-comment">{{ item.comment }}</div>
            <div class="todo-date" v-if="item.dueDate">{{ item.dueDate }}</div>
          </div>
        </td>

        <td style="text-align: center;">
          <div v-if="isEditMode" class="action-group">
            <template v-if="editingId === item.id">
              <button @click="doUpdate(item)" class="icon-btn save">✅</button>
              <button @click="cancelEdit" class="icon-btn cancel">✕</button>
            </template>
            <template v-else>
              <button @click="startEdit(item)" class="icon-btn">✏️</button>
              <button @click="doRemove(item)" class="icon-btn">🗑️</button>
            </template>
          </div>
          <div v-else>
            <button @click="doChangeState(item)" class="done-btn">完了</button>
          </div>
        </td>
      </tr>
    </tbody>
  </table>

  <h2 style="margin-top: 40px;">完了済み</h2>
  <table class="archive-table">
    <tbody>
      <tr v-for="item in archivedTodos" :key="item.id">
        <td style="width: 40px; text-align: center;">{{ item.isStarred ? '★' : '☆' }}</td>
        <td>
          <div class="todo-comment">{{ item.comment }}</div>
          <div class="todo-date">{{ item.dueDate }}</div>
        </td>
        <td style="width: 80px; text-align: center;">
          <button @click="doChangeState(item)" class="icon-btn">🔄</button>
          <button v-if="isEditMode" @click="doRemove(item)" class="icon-btn">🗑️</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>

  <script src="https://cdn.jsdelivr.net/npm/vue@2"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

  </script>
  <script src="./main.js"></script>
</body>
</html>
