<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todoリスト</title>
  <link rel="stylesheet" href="./main.css">
</head>
<body>
<div id="app">
  <button class="hamburger" @click="isMenuOpen = !isMenuOpen">
    <span></span><span></span><span></span>
  </button>

  <div class="menu-overlay" v-if="isMenuOpen" @click="isMenuOpen = false"></div>
  <div class="side-menu" :class="{ 'is-open': isMenuOpen }">
    <h2>設定</h2>
    
    <div class="menu-item">
      <span>期限通知</span>
      <label class="switch">
        <input type="checkbox" v-model="notificationEnabled" @change="toggleNotification">
        <span class="slider"></span>
      </label>
    </div>

    <div class="menu-item" style="margin-top: 30px;">
      <button @click="showTerms = true" style="cursor:pointer;">利用規約を表示</button>
    </div>
  </div>

  <div class="modal-overlay" v-if="showTerms" @click="showTerms = false">
    <div class="modal-content" @click.stop>
      <h2>利用規約</h2>
      <div class="terms-text">
        <p>ここに規約の全文を記述します。<br>このアプリの利用には自己責任で……</p>
      </div>
      <button @click="showTerms = false">閉じる</button>
    </div>
  </div>

  <h1>ToDoリスト</h1>

  <div v-if="user" class="user-area">
    <div class="user-card">
      <img :src="user.photoURL" alt="icon" class="user-icon">
      <span class="user-name">{{ user.displayName }}</span>
      <button @click="logout" class="logout-button">ログアウト</button>
    </div>
  </div>
  <div v-else class="user-area">
    <button @click="login">Googleでログイン</button>
  </div>
    
  <form class="add-form" @submit.prevent="doAdd">
    <input type="text" id="todo-input" v-model="newTodo" placeholder="タスクを入力">
    <input type="date" id="todo-date" v-model="newDate">
    <button type="submit">追加</button>
  </form>

  <table>
    <thead>
      <tr><th>コメント</th><th>期限</th><th>状態</th><th>-</th></tr>
    </thead>
    <tbody>
      <tr v-for="item in todos" :key="item.id" 
          :class="{ 
            'done-item': item.state === '完了', 
            'danger-item': item.state !== '完了' && isUrgent(item.dueDate) 
          }">
        <td>{{ item.comment }}</td>
        <td>{{ item.dueDate }}</td>
        <td><button @click="doChangeState(item)">{{ item.state }}</button></td>
        <td><button @click="doRemove(item)">削除</button></td>
      </tr>
    </tbody>
  </table>
</div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {
        console.log('sw.js が見つかりませんが、通知機能はブラウザ側の設定で動作します');
      });
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/vue@2"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCX7awe_pw1dR4GXRQjJYE5SPBBGc416WY",
      authDomain: "todo-list-h.firebaseapp.com",
      projectId: "todo-list-h",
      storageBucket: "todo-list-h.firebasestorage.app",
      messagingSenderId: "653345122534",
      appId: "1:653345122534:web:d48773cf94a3a4efa17327"
    };
    firebase.initializeApp(firebaseConfig);
  </script>
  <script src="./main.js"></script>
</body>
</html>
